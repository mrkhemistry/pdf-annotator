  <path d="M 215 165 L 215 260 L 120 420 Q 112 442 138 442 L 374 442 Q 400 442 392 420 L 297 260 L 297 165 Z"
        stroke="#a0c8d4" stroke-width="14" fill="white" stroke-linejoin="round"/>
