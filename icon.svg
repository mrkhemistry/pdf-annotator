  <!-- Big bubble in neck -->
  <circle cx="256" cy="215" r="26" fill="none" stroke="#1d6e8a" stroke-width="8"/>
  <!-- Mid bubbles -->
  <circle cx="237" cy="295" r="12" fill="none" stroke="#1d6e8a" stroke-width="6"/>
  <circle cx="272" cy="298" r="14" fill="#a0c8d4"/>
  <circle cx="272" cy="298" r="5" fill="white"/>
  <!-- Bubbles in liquid -->
  <circle cx="222" cy="395" r="16" fill="none" stroke="#a0c8d4" stroke-width="4"/>
  <circle cx="295" cy="378" r="11" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="322" cy="408" r="6" fill="none" stroke="white" stroke-width="2"/>
</svg>
